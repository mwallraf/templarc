server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # For any path that doesn't match a real file, fall back to index.html so
    # the React router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Docs (Docusaurus static build) ────────────────────────────────────────
    # Served from /usr/share/nginx/html/docs/ (copied in Dockerfile).
    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        try_files $uri $uri/ /docs/index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # The frontend calls /api/* (same-origin). Nginx strips the /api prefix and
    # forwards to the FastAPI container.  This mirrors the Vite dev proxy in
    # vite.config.ts so behaviour is identical in dev and production.
    #
    # Example: GET /api/catalog/projects  →  GET http://api:8000/catalog/projects
    location /api/ {
        proxy_pass         http://api:8000/;

        proxy_http_version 1.1;

        # Required headers for FastAPI / uvicorn
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward the Origin header so FastAPI's CORS middleware receives the
        # browser's actual origin (needed for cross-origin deployments).
        proxy_set_header   Origin            $http_origin;

        # Pass WebSocket upgrade headers (for future HMR or WS endpoints)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts generous enough for slow renders
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashes asset filenames, so these can be cached aggressively.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
