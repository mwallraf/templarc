[alembic]
# Path to migration scripts
script_location = migrations

# Migration file naming: date + time + rev + slug for chronological ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

# Max length of the slug portion of the filename
truncate_slug_length = 40

# Version location — explicit to avoid cwd sensitivity
version_locations = %(here)s/migrations/versions

# Output encoding for generated migration scripts
output_encoding = utf-8

# sqlalchemy.url is intentionally NOT set here.
# It is configured programmatically in migrations/env.py by reading
# api/config.py → settings.async_database_url.
# This avoids duplicating credentials and supports postgresql+asyncpg://.

[post_write_hooks]
# Uncomment to auto-format migrations with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
