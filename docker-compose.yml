# ─── Base service definitions ─────────────────────────────────────────────────
#
# Shared by all environments. Do NOT run this file alone — always combine with
# an environment overlay that adds port bindings:
#
#   Dev:   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# (The Makefile targets 'make dev' and 'make prod' do this automatically.)
#
# Port bindings are intentionally absent here to prevent the "double mapping"
# problem that occurs when Compose merges port lists from overlapping files.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-templarc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-templarcpwd}
      POSTGRES_DB:       ${POSTGRES_DB:-templarc}
    # No host-port binding in production — only the backend network can reach db.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-templarc} -d ${POSTGRES_DB:-templarc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  api:
    image: ${REGISTRY:-ghcr.io/mwallraf}/templarc-api:${VERSION:-latest}
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production      # use the lean, baked-in production stage
      args:
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides the DATABASE_URL in .env with the Docker service hostname.
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-templarc}:${POSTGRES_PASSWORD:-templarcpwd}@db:5432/${POSTGRES_DB:-templarc}
      TEMPLATES_REPO_PATH: /app/templates_repo
      # Pass proxy settings at runtime so httpx (datasource resolver) respects them.
      # NO_PROXY must include all internal Docker service names so datasource calls
      # to e.g. http://mock-api:8080/ are never sent through a corporate proxy.
      HTTP_PROXY:  ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY:    ${NO_PROXY:-localhost,127.0.0.1,db,ldap,mock-api,api,frontend}
    # No host-port binding — only the frontend nginx container reaches the API.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind-mount the templates Git repo so it survives container restarts.
      - ./templates_repo:/app/templates_repo
    networks:
      - backend

  frontend:
    image: ${REGISTRY:-ghcr.io/mwallraf}/templarc-frontend:${VERSION:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production      # nginx serving the Vite build output
      args:
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
    restart: unless-stopped
    # No ports here — added by docker-compose.prod.yml or docker-compose.dev.yml.
    depends_on:
      - api
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
