# ─── Production deployment ────────────────────────────────────────────────────
#
# Intended for production or staging environments.
# Before running, ensure .env contains secure values for:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, SECRET_KEY,
#   LDAP_SERVER, LDAP_BASE_DN, LDAP_ADMIN_GROUP
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# The database and API ports are NOT exposed to the host.
# The frontend (nginx) is the single public entry-point on FRONTEND_PORT (80).
# It proxies /api/* to the FastAPI container internally.
# For TLS, place a reverse proxy (nginx, Caddy, Traefik) in front of port 80.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-templarc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-templarcpwd}
      POSTGRES_DB:       ${POSTGRES_DB:-templarc}
    # No host-port binding in production — only the backend network can reach db.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-templarc} -d ${POSTGRES_DB:-templarc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production      # use the lean, baked-in production stage
      args:
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides the DATABASE_URL in .env with the Docker service hostname.
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-templarc}:${POSTGRES_PASSWORD:-templarcpwd}@db:5432/${POSTGRES_DB:-templarc}
      TEMPLATES_REPO_PATH: /app/templates_repo
    # No host-port binding — only the frontend nginx container reaches the API.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind-mount the templates Git repo so it survives container restarts.
      - ./templates_repo:/app/templates_repo
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production      # nginx serving the Vite build output
      args:
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
    restart: unless-stopped
    ports:
      # This is the only publicly exposed port. nginx proxies /api/* to the api
      # service internally; everything else is served as static files.
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
